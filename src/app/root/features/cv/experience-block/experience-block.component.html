<div class="py-4">
  <h3 class="pt-0 pb-0 font-normal uppercase">
    <span class="font-extrabold text-[#FE7F2D]"> {{ title }}, </span>
    <span>
      {{ company }}
    </span>
  </h3>
  <div class="font-semibold pb-4">
    <span> {{ startFormatted }} - {{ endFormatted }} </span>
  </div>
  <div class="py-2 flex flex-wrap gap-2" *ngIf="priorRoles.length > 0">
    <div class="font-semibold">Prior Roles:</div>
    <tc-horizontal-list [items]="priorRoles" />
  </div>
  <div class="py-3">
    {{ summary }}
  </div>
  <div>
    <tc-vertical-list [items]="responsibilities" />
  </div>
</div>
